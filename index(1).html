<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Party Dehradun — Order Online 🍕</title>
<meta name="description" content="Order fresh pizza online from Pizza Party Dehradun. Best pizza on Saharanpur Road. UPI payment, fast delivery, live tracking.">
<meta property="og:title" content="Pizza Party Dehradun 🍕">
<meta property="og:description" content="Order fresh pizza online — fast delivery in Dehradun!">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">

<!-- ✅ FIX: Updated to latest stable Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#D92B2B;--red-dark:#B01F1F;--red-light:#FDF0F0;
  --orange:#F26419;--yellow:#FFB703;
  --bg:#FAFAF8;--white:#FFFFFF;
  --gray-100:#F5F4F0;--gray-200:#E8E6E0;--gray-300:#C8C5BC;
  --gray-500:#8A8880;--gray-700:#4A4845;--gray-900:#1A1916;
  --green:#2D7D46;--green-light:#EAF7EE;
  --blue:#1A6BB5;--blue-light:#EBF4FF;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,.15);
  --r-sm:6px;--r-md:12px;--r-lg:18px;--r-xl:24px;--r-full:9999px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--gray-900);font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
.hide{display:none!important}

/* HEADER */
header{background:var(--white);border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 16px;height:60px;display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-icon{width:36px;height:36px;background:var(--red);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-weight:800;font-size:16px;line-height:1.1}
.logo-text span{color:var(--red);display:block;font-size:10px;font-weight:500;color:var(--gray-500)}
nav{display:flex;gap:2px;margin-left:auto}
nav button{padding:6px 12px;border-radius:var(--r-full);font-size:13px;font-weight:500;color:var(--gray-700);transition:all .2s}
nav button:hover,nav button.active{background:var(--red-light);color:var(--red)}
.header-actions{display:flex;align-items:center;gap:8px}
.btn-icon{width:36px;height:36px;border-radius:var(--r-full);background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;position:relative;border:none;cursor:pointer}
.btn-icon:hover{background:var(--gray-200)}
.badge{position:absolute;top:-3px;right:-3px;background:var(--red);color:white;border-radius:var(--r-full);min-width:17px;height:17px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid white}
main{max-width:1200px;width:100%;margin:0 auto;padding:16px}

/* HERO */
.hero{background:linear-gradient(135deg,#1A1916 0%,#2D2C28 100%);border-radius:var(--r-xl);padding:40px 32px;margin-bottom:24px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;overflow:hidden;position:relative}
.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:220px;height:220px;background:var(--red);opacity:.07;border-radius:50%}
.hero-tag{background:var(--red);color:white;font-size:11px;font-weight:700;padding:4px 12px;border-radius:var(--r-full);display:inline-flex;align-items:center;gap:6px;margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.hero h1{font-size:36px;font-weight:900;color:white;line-height:1.1;margin-bottom:10px}
.hero h1 em{color:var(--yellow);font-style:normal}
.hero p{color:#A09E98;font-size:14px;line-height:1.6;margin-bottom:20px}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{background:var(--red);color:white;padding:11px 22px;border-radius:var(--r-full);font-weight:700;font-size:14px;transition:all .2s;display:inline-flex;align-items:center;gap:7px;border:none;cursor:pointer}
.btn-primary:hover{background:var(--red-dark);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-outline-white{background:transparent;color:white;border:1.5px solid rgba(255,255,255,.2);padding:10px 20px;border-radius:var(--r-full);font-weight:500;font-size:14px;transition:all .2s;cursor:pointer}
.btn-outline-white:hover{background:rgba(255,255,255,.08)}
.hero-pizza{width:140px;height:140px;background:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:72px;box-shadow:0 16px 48px rgba(255,183,3,.25);animation:float 3s ease-in-out infinite;flex-shrink:0}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* PROMO */
.promo-bar{background:var(--orange);color:white;border-radius:var(--r-lg);padding:10px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.promo-txt{flex:1;font-weight:600;font-size:13px}
.promo-code-pill{background:rgba(0,0,0,.15);padding:2px 8px;border-radius:var(--r-sm);font-family:monospace;font-weight:700;letter-spacing:1px}
.promo-input-wrap{display:flex;gap:6px}
.promo-input{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:white;padding:6px 12px;border-radius:var(--r-full);font-size:12px;width:130px;outline:none}
.promo-input::placeholder{color:rgba(255,255,255,.6)}
.btn-promo{background:white;color:var(--orange);padding:6px 14px;border-radius:var(--r-full);font-weight:700;font-size:12px;cursor:pointer;border:none}

/* SECTION */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:20px;font-weight:800}
.sec-title span{color:var(--red)}
.see-all{color:var(--red);font-size:13px;font-weight:600;cursor:pointer}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.cat-tab{padding:7px 16px;border-radius:var(--r-full);font-size:13px;font-weight:500;border:1.5px solid var(--gray-200);color:var(--gray-700);white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:5px;background:white;cursor:pointer}
.cat-tab:hover,.cat-tab.active{background:var(--red);border-color:var(--red);color:white}

/* MENU GRID */
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.menu-card{background:white;border-radius:var(--r-lg);border:1px solid var(--gray-200);overflow:hidden;transition:all .25s;cursor:default}
.menu-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.menu-card-img{height:150px;display:flex;align-items:center;justify-content:center;font-size:64px;position:relative}
.menu-card-img.veg{background:linear-gradient(135deg,#EAF7EE,#D4F0DF)}
.menu-card-img.nonveg{background:linear-gradient(135deg,#FDF0F0,#FAD8D8)}
.menu-card-img.drink{background:linear-gradient(135deg,#EBF4FF,#D0E8FF)}
.menu-card-img.sides{background:linear-gradient(135deg,#FFF8E6,#FFE9A8)}
.veg-dot,.nonveg-dot{width:14px;height:14px;border:2px solid;border-radius:3px;display:flex;align-items:center;justify-content:center;position:absolute;top:8px;left:8px}
.veg-dot{border-color:var(--green)}.veg-dot::after{content:'';width:7px;height:7px;background:var(--green);border-radius:50%}
.nonveg-dot{border-color:var(--red)}.nonveg-dot::after{content:'';width:7px;height:7px;background:var(--red);border-radius:50%}
.bestseller{position:absolute;top:8px;right:8px;background:var(--yellow);color:#7a5800;font-size:9px;font-weight:700;padding:2px 6px;border-radius:var(--r-full);text-transform:uppercase}
.menu-card-body{padding:12px}
.menu-card-name{font-weight:700;font-size:14px;margin-bottom:3px}
.menu-card-desc{color:var(--gray-500);font-size:11px;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.menu-card-footer{display:flex;align-items:center;justify-content:space-between}
.price{font-weight:800;font-size:16px}
.price .old{font-size:11px;color:var(--gray-500);text-decoration:line-through;font-weight:400;margin-left:3px}
.btn-add{background:var(--red);color:white;border-radius:var(--r-full);padding:6px 14px;font-size:12px;font-weight:700;transition:all .2s;display:flex;align-items:center;gap:5px;border:none;cursor:pointer}
.btn-add:hover{background:var(--red-dark)}
.qty-ctrl{display:flex;align-items:center;gap:6px;background:var(--red-light);border-radius:var(--r-full);padding:3px}
.qty-btn{width:26px;height:26px;background:var(--red);color:white;border-radius:50%;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .2s;border:none;cursor:pointer}
.qty-num{font-weight:700;font-size:13px;color:var(--red);min-width:18px;text-align:center}

/* CART SIDEBAR */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-sidebar{position:fixed;right:0;top:0;bottom:0;width:360px;max-width:100vw;background:white;z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-lg)}
.cart-sidebar.open{transform:translateX(0)}
.cart-header{padding:18px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between}
.cart-header h2{font-size:18px;font-weight:800}
.btn-close{width:32px;height:32px;border-radius:50%;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:18px;border:none;cursor:pointer}
.cart-items{flex:1;overflow-y:auto;padding:14px}
.cart-empty{text-align:center;padding:40px 16px;color:var(--gray-500)}
.cart-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.cart-item-img{width:50px;height:50px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:var(--gray-100)}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-weight:600;font-size:13px}
.cart-item-price{color:var(--gray-500);font-size:12px}
.cart-footer{padding:14px;border-top:1px solid var(--gray-200)}
.cart-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;color:var(--gray-700)}
.cart-row.total{font-weight:700;font-size:15px;color:var(--gray-900);padding-top:6px;border-top:1px solid var(--gray-200);margin-top:6px}
.btn-checkout{width:100%;background:var(--red);color:white;padding:13px;border-radius:var(--r-lg);font-weight:700;font-size:14px;margin-top:10px;transition:all .2s;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-checkout:hover{background:var(--red-dark)}

/* CHECKOUT */
.checkout-grid{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
.card{background:white;border-radius:var(--r-lg);border:1px solid var(--gray-200);padding:18px;margin-bottom:14px}
.card h3{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h3 .step-num{background:var(--red);color:white;width:22px;height:22px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--gray-700);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-input{width:100%;border:1.5px solid var(--gray-200);border-radius:var(--r-md);padding:9px 12px;font-size:14px;outline:none;transition:border .2s;font-family:inherit}
.form-input:focus{border-color:var(--red)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pay-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.pay-opt{border:1.5px solid var(--gray-200);border-radius:var(--r-md);padding:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;position:relative}
.pay-opt:hover,.pay-opt.selected{border-color:var(--red);background:var(--red-light)}
.pay-opt input[type=radio]{position:absolute;opacity:0}
.pay-icon{font-size:20px}
.pay-name{font-weight:600;font-size:12px}
.pay-sub{font-size:10px;color:var(--gray-500)}
.summary-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--gray-100);font-size:13px}
.summary-total{display:flex;justify-content:space-between;font-weight:700;font-size:14px;margin-top:10px;padding-top:10px;border-top:1.5px solid var(--gray-200)}
.btn-place{width:100%;background:var(--red);color:white;padding:14px;border-radius:var(--r-lg);font-weight:700;font-size:15px;margin-top:14px;transition:all .2s;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-place:hover{background:var(--red-dark)}

/* TRACKING */
.track-box{background:white;border-radius:var(--r-xl);border:1px solid var(--gray-200);overflow:hidden;margin-bottom:20px}
.track-head{background:linear-gradient(135deg,#1A1916,#2D2C28);padding:22px 24px;color:white}
.order-num{font-size:11px;color:#A09E98;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.order-id{font-size:22px;font-weight:800;color:var(--yellow)}
.order-eta{margin-top:10px;display:flex;align-items:center;gap:8px;font-size:13px;color:#C8C5BC}
.eta-pill{background:rgba(255,183,3,.2);color:var(--yellow);padding:3px 10px;border-radius:var(--r-full);font-weight:700}
.track-steps{padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative}
.track-steps::before{content:'';position:absolute;top:26px;left:calc(12.5% + 10px);right:calc(12.5% + 10px);height:2px;background:var(--gray-200)}
.track-step{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;position:relative;z-index:1}
.step-ico{width:44px;height:44px;border-radius:50%;border:2px solid var(--gray-200);background:white;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .4s}
.track-step.done .step-ico{background:var(--green);border-color:var(--green)}
.track-step.active .step-ico{background:var(--red);border-color:var(--red);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(217,43,43,.15)}50%{box-shadow:0 0 0 10px rgba(217,43,43,.05)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.step-label{font-size:11px;font-weight:600;color:var(--gray-700)}
.step-time{font-size:10px;color:var(--gray-500)}

/* MAP */
.map-area{background:var(--gray-100);border-radius:var(--r-lg);height:200px;position:relative;overflow:hidden;margin:0 24px 24px}
.map-bg{width:100%;height:100%;background:linear-gradient(135deg,#E8F4E8,#C8E0C8);position:relative}
.map-road-h{position:absolute;background:#fff;opacity:.8;height:7px}
.map-road-v{position:absolute;background:#fff;opacity:.8;width:7px}
.map-restaurant{position:absolute;font-size:22px;transform:translate(-50%,-100%)}
.map-rider{position:absolute;font-size:20px;transform:translate(-50%,-50%);animation:riderMove 8s infinite}
@keyframes riderMove{0%{left:35%;top:65%}50%{left:55%;top:45%}100%{left:35%;top:65%}}
.map-you{position:absolute;right:18%;top:18%;font-size:22px}

/* ──────────────────────────────────────────
   AUTH MODAL — completely redesigned
   ────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:white;border-radius:var(--r-xl);padding:28px;width:100%;max-width:420px;position:relative;transform:scale(.95) translateY(10px);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.modal-overlay.open .modal{transform:scale(1) translateY(0)}
.modal-title{font-size:22px;font-weight:800;margin-bottom:3px}
.modal-sub{color:var(--gray-500);font-size:13px;margin-bottom:20px}

/* OTP digit boxes */
.otp-boxes{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.otp-box{width:44px;height:54px;border:2px solid var(--gray-200);border-radius:var(--r-md);font-size:22px;font-weight:800;text-align:center;outline:none;transition:all .2s;-moz-appearance:textfield}
.otp-box::-webkit-outer-spin-button,.otp-box::-webkit-inner-spin-button{-webkit-appearance:none}
.otp-box:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(217,43,43,.12)}
.otp-box.filled{border-color:var(--red);background:var(--red-light)}

/* Resend OTP timer */
.resend-wrap{text-align:center;margin-top:8px;font-size:12px;color:var(--gray-500)}
.resend-btn{color:var(--red);font-weight:700;cursor:pointer;background:none;border:none;font-size:12px;padding:0}
.resend-btn:disabled{color:var(--gray-300);cursor:not-allowed}

/* Attempt warning */
.attempt-warn{background:#FFF3CD;border:1px solid #F5C518;border-radius:var(--r-md);padding:8px 12px;font-size:12px;color:#856404;margin-bottom:12px;display:flex;align-items:center;gap:6px}

.divider{display:flex;align-items:center;gap:8px;color:var(--gray-500);font-size:12px;margin:14px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gray-200)}
.btn-full{width:100%;padding:11px;border-radius:var(--r-lg);font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;transition:all .2s;border:none}
.btn-red{background:var(--red);color:white}
.btn-red:hover:not(:disabled){background:var(--red-dark)}
.btn-red:disabled{opacity:.55;cursor:not-allowed}
.btn-ghost{background:var(--gray-100);color:var(--gray-900);border:1px solid var(--gray-200)}
.btn-ghost:hover{background:var(--gray-200)}
.btn-google{background:white;color:var(--gray-900);border:1.5px solid var(--gray-200);display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{background:var(--gray-100);border-color:var(--gray-300)}
.input-prefix-wrap{display:flex;border:1.5px solid var(--gray-200);border-radius:var(--r-md);overflow:hidden;transition:border .2s}
.input-prefix-wrap:focus-within{border-color:var(--red)}
.input-prefix{padding:10px 12px;background:var(--gray-100);color:var(--gray-700);font-size:13px;border-right:1px solid var(--gray-200);white-space:nowrap}
.input-prefix-wrap input{flex:1;border:none;padding:10px 12px;font-size:14px;outline:none;font-family:inherit}

/* Input error state */
.input-error{border-color:#D92B2B!important}
.field-error{color:#D92B2B;font-size:11px;margin-top:4px}

/* SUCCESS */
.success-page{text-align:center;padding:48px 16px}
.success-ico{font-size:64px;margin-bottom:16px;animation:bounceIn .6s ease}
@keyframes bounceIn{0%{transform:scale(.3)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.success-title{font-size:28px;font-weight:800;margin-bottom:6px}
.success-sub{color:var(--gray-500);font-size:15px;margin-bottom:20px}
.order-pill{background:var(--gray-100);border-radius:var(--r-xl);padding:14px 28px;display:inline-flex;flex-direction:column;align-items:center;margin-bottom:28px}
.order-pill .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gray-500);margin-bottom:3px}
.order-pill .num{font-size:26px;font-weight:800;color:var(--red)}

/* REVIEWS */
.review-card{background:white;border-radius:var(--r-lg);border:1px solid var(--gray-200);padding:14px;margin-bottom:10px}
.review-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--red-light);color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.stars{color:var(--yellow);font-size:13px}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1916;color:white;padding:11px 22px;border-radius:var(--r-full);font-size:13px;font-weight:500;z-index:9999;transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-lg);white-space:nowrap;display:flex;align-items:center;gap:8px}
.toast.show{transform:translateX(-50%) translateY(0)}

/* FOOTER */
footer{background:#1A1916;color:#A09E98;padding:32px 16px;margin-top:40px;text-align:center}

function formatPhone(ph) {
  if (!ph) return ''
  return ph.replace('+91', '') // show just the 10-digit part
}

function updateUserIcon() {
  const el = document.getElementById('user-icon')

}

function openAuthModal() {
  state.otpStep = 'phone'
  state.otpAttempts = 0
  clearOtpCooldown()
  renderAuthForm()
  document.getElementById('auth-modal').classList.add('open')

function closeAuthModal() {
  document.getElementById('auth-modal').classList.remove('open')
  clearOtpCooldown()

// ✅ FIX: Create reCAPTCHA verifier only once, not inside sendOTP
function ensureRecaptcha() {
  if (!window.recaptchaVerifier) {
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      size: 'invisible',
      callback: () => {},
      'expired-callback': () => {
        window.recaptchaVerifier = null
        showToast('reCAPTCHA expired. Please try again.', '⚠️')
      }
    })
  }
  return window.recaptchaVerifier
}

window.sendOTP = async function() {
  const nameInp = document.getElementById('name-inp')
  const phoneInp = document.getElementById('phone-inp')
  const phone = phoneInp?.value?.trim()
  const name = nameInp?.value?.trim()

  // Validation
  if (name !== undefined && !name) {
    phoneInp.classList.add('input-error')
    showFieldError('name-err', 'Please enter your name')
    return
  }
  if (!phone || !/^[6-9]\d{9}$/.test(phone)) {
    phoneInp?.classList.add('input-error')
    showFieldError('phone-err', 'Enter valid 10-digit Indian mobile number')
    return
  }

  state.pendingName = name || ''
  const fullPhone = `+91${phone}`
  const btn = document.getElementById('send-otp-btn')

  try {
    btn.disabled = true
    btn.textContent = '⏳ Sending...'

    const verifier = ensureRecaptcha()
    window.confirmationResult = await auth.signInWithPhoneNumber(fullPhone, verifier)

    state.otpStep = 'otp'
    renderAuthForm()
    startResendTimer()
    showToast(`OTP sent to +91 ${phone}`, '✅')
  } catch(err) {
    console.error('OTP send error:', err)
    // ✅ FIX: Clear verifier on error so it can be recreated
    if (window.recaptchaVerifier) {
      window.recaptchaVerifier.clear()
      window.recaptchaVerifier = null
    }
    btn.disabled = false
    btn.textContent = '📱 Send OTP →'
    showToast(getAuthError(err), '❌')
  }
}

window.verifyOTP = async function() {
  // ✅ FIX: Brute-force protection
  if (state.otpAttempts >= MAX_OTP_ATTEMPTS) {
    showToast('Too many attempts. Please request a new OTP.', '🚫')
    return
  }

  // ✅ FIX: Collect OTP from individual digit boxes
  const digits = [...document.querySelectorAll('.otp-box')].map(b => b.value).join('')
  if (digits.length !== 6) {
    showToast('Enter all 6 digits', '❌')
    return
  }

  const btn = document.getElementById('verify-btn')
  btn.disabled = true
  btn.textContent = '⏳ Verifying...'

  try {
    const result = await window.confirmationResult.confirm(digits)
    // ✅ FIX: Update profile with the name user entered in step 1
    if (state.pendingName) {
      await result.user.updateProfile({ displayName: state.pendingName }).catch(() => {})
    }
    state.otpAttempts = 0
    clearOtpCooldown()
    closeAuthModal()
    showToast('Login successful! Welcome 🎉', '✅')
    showPage(state.page)
  } catch(err) {
    state.otpAttempts++
    const remaining = MAX_OTP_ATTEMPTS - state.otpAttempts
    btn.disabled = false
    btn.textContent = '✅ Verify OTP'
    if (remaining <= 0) {
      showToast('Too many wrong attempts. Request a new OTP.', '🚫')
      renderAuthForm() // Re-render to show warning
    } else {
      showToast(`Wrong OTP! ${remaining} attempt${remaining===1?'':'s'} left`, '❌')
      renderAttemptWarning(remaining)
    }
  }
}

// ✅ NEW: Resend OTP with cooldown timer
window.resendOTP = async function() {
  if (state.otpCooldown > 0) return

  // ✅ Reset the verifier for resend
  if (window.recaptchaVerifier) {
    window.recaptchaVerifier.clear()
    window.recaptchaVerifier = null
  }

  state.otpStep = 'phone'
  state.otpAttempts = 0
  renderAuthForm()
  showToast('Enter your number again to resend OTP', 'ℹ️')
}

function startResendTimer() {
  state.otpCooldown = OTP_COOLDOWN_SECS
  updateResendUI()
  clearOtpCooldown()
  state._resendInterval = setInterval(() => {
    state.otpCooldown--
    updateResendUI()
    if (state.otpCooldown <= 0) {
      clearOtpCooldown()
      updateResendUI()
    }
  }, 1000)
}

function clearOtpCooldown() {
  if (state._resendInterval) clearInterval(state._resendInterval)
  state._resendInterval = null

// ✅ NEW: OTP box auto-advance, backspace, paste support
function setupOtpBoxes() {
  const boxes = document.querySelectorAll('.otp-box')
  boxes.forEach((box, idx) => {
    box.addEventListener('input', e => {
      const val = e.target.value.replace(/\D/g, '').slice(-1)
      box.value = val
      if (val) {
        box.classList.add('filled')
        if (idx < 5) boxes[idx + 1]?.focus()
        else document.getElementById('verify-btn')?.focus()
      } else {
        box.classList.remove('filled')
      }
    })
    box.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !box.value && idx > 0) {
        boxes[idx - 1].value = ''
        boxes[idx - 1].classList.remove('filled')
        boxes[idx - 1].focus()
      }
      if (e.key === 'Enter') verifyOTP()
    })
    box.addEventListener('paste', e => {
      e.preventDefault()
      const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6)
      pasted.split('').forEach((ch, i) => {
        if (boxes[i]) {
          boxes[i].value = ch
          boxes[i].classList.add('filled')
        }
      })
      boxes[Math.min(pasted.length, 5)]?.focus()
    })
    // Select all on click for easy re-entry
    box.addEventListener('focus', () => box.select())
  })
}

function saveCart() {
  localStorage.setItem('pp_cart', JSON.stringify(state.cart))
}
function cartTotal() {
  const sub = state.cart.reduce((a,c) => a + c.price*c.qty, 0)
  let disc = 0
  if (state.promoApplied) {
    disc = state.promoFlat ? state.promoFlat : Math.round(sub * state.promoDiscount/100)
    disc = Math.min(disc, sub) // can't discount more than subtotal
  }
  const del = (sub - disc) >= 399 ? 0 : 49
  const tax = Math.round((sub-disc)*0.05)
  return { sub, disc, del, tax, total: sub-disc+del+tax }
}
function getQty(id) { return state.cart.find(c=>c.id===id)?.qty || 0 }
function addToCart(item) {
  const ex = state.cart.find(c=>c.id===item.id)
  if (ex) ex.qty++
  else state.cart.push({...item, qty:1})
  saveCart()
  updateCartBadge()
  showToast(item.name + ' added!','🍕')
  refreshBtn(item.id)
  if (document.getElementById('cart-sidebar').classList.contains('open')) renderCart()
}
function removeFromCart(id) {
  const it = state.cart.find(c=>c.id===id)
  if (!it) return
  if (it.qty > 1) it.qty--
  else state.cart = state.cart.filter(c=>c.id!==id)
  saveCart()
  updateCartBadge()
  refreshBtn(id)
  if (document.getElementById('cart-sidebar').classList.contains('open')) renderCart()
}
function updateCartBadge() {
  const cnt = state.cart.reduce((a,c)=>a+c.qty,0)
  const b = document.getElementById('cart-badge')
  if (!b) return
  if (cnt > 0) { b.textContent=cnt; b.classList.remove('hide') }
  else b.classList.add('hide')
}
function refreshBtn(id) {
  const el = document.getElementById('btn-'+id)
  if (!el) return
  const item = MENU.find(m=>m.id===id)
  if (!item) return
  if (item.sizes && item.sizes.length > 1) {
    el.outerHTML = `<button class="btn-add" id="btn-${id}" onclick="openSizePicker(${id})">+ Add</button>`
  } else {
    el.outerHTML = renderAddBtn(item)
  }
}
function renderAddBtn(item) {
  const qty = getQty(item.id)
  if (qty === 0) return `<button class="btn-add" id="btn-${item.id}" onclick="addToCart(MENU.find(m=>m.id===${item.id}))">+ Add</button>`
  return `<div class="qty-ctrl" id="btn-${item.id}"><button class="qty-btn" onclick="removeFromCart(${item.id})">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="addToCart(MENU.find(m=>m.id===${item.id}))">+</button></div>`
}
function renderCart() {
  const list = document.getElementById('cart-items-list')
  const footer = document.getElementById('cart-footer')
  if (!list || !footer) return
  if (state.cart.length === 0) {
    list.innerHTML = `<div class="cart-empty"><div style="font-size:40px;margin-bottom:10px">🛒</div><div style="font-weight:600">Your cart is empty</div><div style="font-size:12px;margin-top:4px">Add some delicious items!</div></div>`
    footer.innerHTML = ''
    return
  }
  list.innerHTML = state.cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-img">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${escHtml(item.name)}</div>
        <div class="cart-item-price">₹${item.price} × ${item.qty} = <strong>₹${item.price*item.qty}</strong></div>
      </div>
      <div class="qty-ctrl"><button class="qty-btn" onclick="removeFromCart(${item.id})">−</button><span class="qty-num">${item.qty}</span><button class="qty-btn" onclick="addToCart(MENU.find(m=>m.id===${item.id}))">+</button></div>
    </div>`).join('')
  const t = cartTotal()
  footer.innerHTML = `
    <div class="cart-row"><span>Subtotal</span><span>₹${t.sub}</span></div>
    ${t.disc>0?`<div class="cart-row" style="color:var(--green)"><span>Promo (${state.promoDiscount}% off)</span><span>−₹${t.disc}</span></div>`:''}
    <div class="cart-row"><span>Delivery ${t.del===0?'<span style="color:var(--green);font-size:10px">FREE</span>':''}</span><span>${t.del===0?'₹0':'₹'+t.del}</span></div>
    <div class="cart-row"><span>Taxes (5%)</span><span>₹${t.tax}</span></div>
    <div class="cart-row total"><span>Total</span><span>₹${t.total}</span></div>
    <button class="btn-checkout" onclick="goCheckout()">🎉 Checkout — ₹${t.total}</button>`
}
function toggleCart() {
  const s = document.getElementById('cart-sidebar')
  const o = document.getElementById('cart-overlay')
  const open = s.classList.toggle('open')
  o.classList.toggle('open', open)
  if (open) renderCart()
}

  toggleCart()

  showPage('checkout')

        </div>
        <div class="form-group"><label>Delivery Note (optional)</label><textarea class="form-input" id="co-note" rows="2" placeholder="Leave at door, call on arrival..."></textarea></div>
      </div>
      <div class="card">
        <h3><span class="step-num">2</span> Payment Method</h3>
        <div class="pay-opts">
          <label class="pay-opt selected" onclick="document.querySelectorAll('.pay-opt').forEach(p=>p.classList.remove('selected'));this.classList.add('selected')">
            <input type="radio" name="payment" value="cod" checked>
            <span class="pay-icon">💵</span>
            <div><div class="pay-name">Cash on Delivery</div><div class="pay-sub">Pay when delivered</div></div>
          </label>
          <label class="pay-opt" onclick="document.querySelectorAll('.pay-opt').forEach(p=>p.classList.remove('selected'));this.classList.add('selected')">
            <input type="radio" name="payment" value="upi">
            <span class="pay-icon">📱</span>
            <div><div class="pay-name">UPI / QR</div><div class="pay-sub">Google Pay, PhonePe</div></div>
          </label>
          <label class="pay-opt" onclick="document.querySelectorAll('.pay-opt').forEach(p=>p.classList.remove('selected'));this.classList.add('selected')">
            <input type="radio" name="payment" value="card">
            <span class="pay-icon">💳</span>
            <div><div class="pay-name">Card</div><div class="pay-sub">Debit / Credit</div></div>
          </label>
          <label class="pay-opt" onclick="document.querySelectorAll('.pay-opt').forEach(p=>p.classList.remove('selected'));this.classList.add('selected')">
            <input type="radio" name="payment" value="wallet">
            <span class="pay-icon">👛</span>
            <div><div class="pay-name">Paytm / Wallet</div><div class="pay-sub">Digital wallets</div></div>
          </label>
        </div>
        <button class="btn-place" onclick="placeOrder()">🎉 Place Order — ₹${t.total}</button>
      </div>
    </div>
    <div>
      <div class="card">
        <h3>📋 Order Summary</h3>
        ${state.cart.map(i=>`<div class="summary-item"><span>${escHtml(i.name)} × ${i.qty}</span><span>₹${i.price*i.qty}</span></div>`).join('')}
        <div class="cart-row" style="margin-top:8px"><span>Subtotal</span><span>₹${t.sub}</span></div>
        ${t.disc>0?`<div class="cart-row" style="color:var(--green)"><span>Promo</span><span>−₹${t.disc}</span></div>`:''}
        <div class="cart-row"><span>Delivery</span><span>${t.del===0?'<span style="color:var(--green)">FREE</span>':'₹'+t.del}</span></div>
        <div class="cart-row"><span>GST (5%)</span><span>₹${t.tax}</span></div>
        <div class="summary-total"><span>Total</span><span>₹${t.total}</span></div>
      </div>
      <div class="card" style="background:var(--green-light);border-color:#b3dfc0">
        <div style="font-size:13px;font-weight:600;color:var(--green)">✅ 100% Safe Ordering</div>
        <div style="font-size:11px;color:#3a6b4a;margin-top:4px">Fresh ingredients · Hygienic packaging · Contactless delivery available</div>
      </div>
    </div>
  </div>`
}

function renderTrack() {
  const step = state.trackStep
  const steps = [
    {ico:'📋',label:'Order Received',time:step>=1?'Just now':'—'},
    {ico:'👨‍🍳',label:'Preparing',time:step>=2?'+5 min':'—'},
    {ico:'🛵',label:'On the Way',time:step>=3?'+15 min':'—'},
    {ico:'✅',label:'Delivered',time:step>=4?'+30 min':'—'}
  ]
  const orderId = state.orderPlaced || 'PP-2025-8821'
  return `
  <div class="track-box">
    <div class="track-head">
      <div class="order-num">Order Number</div>
      <div class="order-id">${orderId}</div>
      <div class="order-eta">📍 Estimated delivery: <span class="eta-pill">~25 mins</span></div>
      <div style="margin-top:8px;font-size:12px;color:#C8C5BC">🛵 Ravi Kumar is delivering · <a href="tel:+919811223344" style="color:var(--yellow)">Call rider</a></div>
    </div>
    <div class="track-steps">
      ${steps.map((s,i)=>`
        <div class="track-step ${i<step?'done':i===step-1?'active':''}">
          <div class="step-ico">${i<step?'✅':s.ico}</div>
          <div class="step-label">${s.label}</div>
          <div class="step-time">${s.time}</div>
        </div>`).join('')}
    </div>
    <div class="map-area">
      <div class="map-bg">
        <div class="map-road-h" style="top:50%;left:0;right:0;transform:translateY(-50%)"></div>
        <div class="map-road-v" style="left:40%;top:0;bottom:0;transform:translateX(-50%)"></div>
        <div class="map-restaurant" style="left:40%;top:80%">🏪</div>
        <div class="map-rider">🛵</div>
        <div class="map-you">📍</div>
      </div>
    </div>
  </div>
  <div class="card">
    <h3>⭐ Rate Your Experience</h3>
    <div style="display:flex;gap:8px;margin-bottom:14px" id="stars">
      ${[1,2,3,4,5].map(s=>`<button style="font-size:28px;background:none;border:none;cursor:pointer" onclick="rateStar(${s})" id="star-${s}">☆</button>`).join('')}
    </div>
    <textarea class="form-input" rows="3" placeholder="How was your experience?"></textarea>
    <button class="btn-primary" style="margin-top:10px;border:none" onclick="showToast('Thank you for your review! 🙏','⭐')">Submit Review</button>
  </div>`
}

function rateStar(n) {
  for(let i=1;i<=5;i++) {
    const s = document.getElementById('star-'+i)
    if (s) s.textContent = i<=n?'★':'☆'
  }
}

let trackTimer = null
function startTrackSim() {
  if (trackTimer) clearTimeout(trackTimer)
  if (state.trackStep < 4) {
    trackTimer = setTimeout(() => {
      state.trackStep = Math.min(state.trackStep + 1, 4)
      if (state.page === 'track') showPage('track')
    }, 8000)
  }
}

function renderSuccess() {
  return `
  <div class="success-page">
    <div class="success-ico">🎉</div>
    <div class="success-title">Order Placed!</div>
    <div class="success-sub">Your pizzas are being freshly prepared!</div>
    <div class="order-pill"><div class="lbl">Your Order Number</div><div class="num">${state.orderPlaced||'PP-2025-8821'}</div></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn-primary" onclick="showPage('track')" style="border:none">📍 Track Order</button>
      <button style="padding:11px 22px;border-radius:var(--r-full);border:1.5px solid var(--gray-200);font-size:14px;font-weight:600;cursor:pointer;background:white" onclick="showPage('menu')">🍕 Order More</button>
    </div>
  </div>`
}

function renderHistory() {
  if (!state.user || state.user.uid === 'guest') {
    return `<div style="text-align:center;padding:60px 20px"><div style="font-size:48px;margin-bottom:12px">🔐</div><div style="font-size:16px;font-weight:700">Sign in to view order history</div><button class="btn-primary" style="margin-top:16px;border:none" onclick="openAuthModal()">Sign In</button></div>`
  }
  return `<div class="card"><h3>📜 Order History</h3><div style="text-align:center;padding:32px;color:var(--gray-500)">No past orders yet.<br><button onclick="showPage('menu')" style="color:var(--red);font-weight:600;cursor:pointer;margin-top:8px;background:none;border:none">Order now! 🍕</button></div></div>`
}

// ══════════════════════════════════════════════════════
//  ORDER PLACEMENT
// ══════════════════════════════════════════════════════
async function placeOrder() {
  const name = document.getElementById('co-name')?.value?.trim()
  const phone = document.getElementById('co-phone')?.value?.trim()
  const addr1 = document.getElementById('co-addr1')?.value?.trim()
  if (!name) { showToast('Please enter your name','❌'); return }
  if (!phone || phone.length < 10) { showToast('Enter valid phone number','❌'); return }
  if (!addr1) { showToast('Please enter delivery address','❌'); return }

  const t = cartTotal()
  const payMethod = document.querySelector('input[name="payment"]:checked')?.value || 'cod'

  try {
    showToast('Placing your order...','⏳')
    const res = await fetch(`${API}/api/orders`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        customer: name, customerName: name, phone, address: addr1,
        items: state.cart.map(i=>({name:i.name,qty:i.qty,price:i.price,emoji:i.emoji})),
        total: t.total, method: payMethod, paymentMethod: payMethod,
        userId: state.user?.uid || 'guest'
      })
    })
    const data = await res.json()
    if (data.id || data.orderId || data.success) {
      state.orderPlaced = data.orderId || data.id
      state.cart = []; state.promoApplied = false; state.promoDiscount = 0; state.promoFlat = 0
      state.trackStep = 1
      saveCart()
      updateCartBadge()
      showPage('success')
    } else { showToast('Order failed: ' + (data.error||'Try again'),'❌') }
  } catch(err) {
    // Offline / backend fallback
    const orderId = `PP-${new Date().getFullYear()}-${Math.floor(8000+Math.random()*2000)}`
    state.orderPlaced = orderId
    state.cart = []; state.promoApplied = false; state.promoDiscount = 0; state.promoFlat = 0
    state.trackStep = 1
    saveCart()
    updateCartBadge()
    showPage('success')
    showToast('Order placed! (offline mode)','✅')
  }
}

function applyPromo() {
  const inp = document.getElementById('promo-inp')
  if (!inp) return
  const code = inp.value.trim().toUpperCase()
  if (PROMOS[code]) {
    if (state.promoApplied) { showToast('Promo already applied!','⚠️'); return }
    state.promoApplied = true
    if (code === 'FLAT50') {
      state.promoDiscount = 0; state.promoFlat = 50
      showToast('FLAT50 applied! ₹50 off 🎉','✅')
    } else {
      state.promoDiscount = PROMOS[code]; state.promoFlat = 0
      showToast(`${code} applied! ${state.promoDiscount}% off 🎉`,'✅')
    }
    inp.value = ''
  } else { showToast('Invalid promo code','❌') }
}

// ── UTILITIES ──
function escHtml(str) {
  if (!str) return ''
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function showToast(msg, ico='ℹ️') {
  const t = document.getElementById('toast')
  if (!t) return
  t.innerHTML = ico + ' ' + escHtml(msg)
  t.classList.add('show')
  clearTimeout(t._timer)
  t._timer = setTimeout(() => t.classList.remove('show'), 3000)
}

// ── INIT ──
updateCartBadge() // Restore cart badge from localStorage
showPage('home')
</script>
